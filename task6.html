<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --pixel-bg: #080010;
            --ui-gold: #ffcc00;
            --ui-blue: #0066ff;
            --ui-border: #ffffff;
        }

        body {
            background-color: var(--pixel-bg);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            image-rendering: pixelated;
            overflow-x: hidden;
        }

        /* --- CRT Effect --- */
        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* --- 8-Bit Borders --- */
        .pixel-border {
            border: 4px solid white;
            box-shadow: 
                0 -4px 0 -4px white, 
                0 4px 0 -4px white, 
                -4px 0 0 -4px white, 
                4px 0 0 -4px white,
                0 0 0 4px black,
                0 8px 0 0 rgba(0,0,0,0.5); /* Shadow depth */
            background: var(--ui-blue);
        }

        .pixel-input {
            background: #000;
            border: 4px solid #333;
            color: var(--ui-gold);
            outline: none;
            padding: 1rem;
        }

        .pixel-input:focus {
            border-color: var(--ui-gold);
        }

        /* --- Animations --- */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor-blink {
            animation: blink 0.8s infinite;
        }

        .task-spawn {
            animation: flash 0.2s steps(2);
        }

        @keyframes flash {
            0% { background: white; }
            100% { background: var(--ui-blue); }
        }

        .defeated {
            animation: vanish 0.5s steps(4) forwards;
            pointer-events: none;
        }

        @keyframes vanish {
            0% { transform: scaleY(1); filter: brightness(5); }
            100% { transform: scaleY(0); opacity: 0; }
        }

        li::before {
            content: "▶";
            margin-right: 15px;
            color: var(--ui-gold);
        }

        li:hover {
            background: #0044cc;
            transform: translateX(10px);
            cursor: pointer;
        }
    </style>
</head>
<body class="crt min-h-screen flex flex-col items-center p-8">

    <div class="w-full max-w-2xl mt-12">
        <header class="text-center mb-12">
            <h1 class="text-2xl md:text-3xl tracking-widest text-white mb-4">
                QUEST <span class="text-[var(--ui-gold)]">LOG</span>
            </h1>
            <div class="flex justify-center gap-2">
                <div class="w-3 h-3 bg-red-600"></div>
                <div class="w-3 h-3 bg-red-600"></div>
                <div class="w-3 h-3 bg-red-600 opacity-30"></div>
                <span class="text-[10px] ml-4">HP: 2/3</span>
            </div>
        </header>

        <div class="pixel-border p-6 mb-12">
            <p class="text-[10px] mb-4 text-blue-200">NEW_OBJECTIVE_</p>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="tinput" maxlength="20" placeholder="ENTER TASK..." 
                    class="pixel-input flex-1 text-sm uppercase">
                <button id="btn" class="bg-[var(--ui-gold)] text-black px-6 py-3 text-xs hover:bg-yellow-300 active:translate-y-1 shadow-[0_4px_0_#997a00]">
                    ADD
                </button>
            </div>
        </div>

        <div class="w-full">
            <div class="flex justify-between text-[10px] text-gray-400 mb-4 px-2">
                <span>OBJECTIVE_NAME</span>
                <span>STATUS</span>
            </div>
            <ul id="list" class="space-y-4">
                </ul>
        </div>
    </div>

    <footer class="fixed bottom-8 text-[8px] text-gray-500 uppercase tracking-widest">
        ©1989 KRITAGYA SYSTEMS <span class="cursor-blink">_</span>
    </footer>

    <script>
        const btn = document.getElementById("btn");
        const tinput = document.getElementById("tinput");
        const list = document.getElementById("list");

        // Simple Audio Engine (8-bit beeps)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        btn.addEventListener("click", () => {
            const val = tinput.value.trim();
            if(!val) {
                playSfx(100, 'square', 0.2); // Error sound
                return;
            }

            playSfx(600, 'square', 0.1); // Success sound

            const li = document.createElement("li");
            li.className = "pixel-border p-5 text-xs flex justify-between items-center task-spawn group transition-all";
            li.innerHTML = `
                <span>${val}</span>
                <span class="text-[8px] text-blue-300 group-hover:text-white">ACTIVE</span>
            `;

            list.prepend(li);
            tinput.value = "";
        });

        list.addEventListener("click", (e) => {
            const li = e.target.closest("li");
            if(li) {
                playSfx(800, 'sawtooth', 0.3); // Clear sound
                li.classList.add("defeated");
                setTimeout(() => li.remove(), 500);
            }
        });

        tinput.addEventListener("keypress", (e) => { if (e.key === "Enter") btn.click(); });
    </script>
</body>
</html>
